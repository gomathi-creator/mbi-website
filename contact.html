<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project | MBI</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="container">
        <div class="logo">
            <img src="images/logo.png" alt="MBI Logo">
            <span>MBI</span>
        </div>
    </div>
</header>

<!-- HERO -->
<section class="contact-hero">
    <h1>Start a Project</h1>
    <p>Tell us about your space. We'll take it forward from there.</p>
</section>

<!-- FORM -->
<section class="contact-form-section">

    <form class="contact-form">

        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your name">
        </div>

        <div class="form-group">
            <label>Phone / Email</label>
            <input type="text" placeholder="Your contact details">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" placeholder="City / Area">
        </div>

        <div class="form-group">
            <label>Project Type</label>
            <select>
                <option>Residential Interior</option>
                <option>Commercial Interior</option>
                <option>Consultation</option>
            </select>
        </div>

        <div class="form-group">
            <label>Expected Start Timeline</label>
            <select>
                <option>Immediately</option>
                <option>1–3 Months</option>
                <option>3–6 Months</option>
                <option>Just Exploring</option>
            </select>
        </div>

        <div class="form-group">
            <label>Project Brief</label>
            <textarea rows="4" placeholder="Tell us about your requirements"></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Submit Inquiry
        </button>

    </form>

</section>

</body>
</html>
